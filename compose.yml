services:
  postgres:
    image: postgres:16-alpine
    container_name: demo-postgres
    environment:
      POSTGRES_DB: demoaws
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demoaws"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: demo-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: demo-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: demo-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: demo-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: auth-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/demoaws?currentSchema=us_fwd
      SPRING_DATASOURCE_USERNAME: demo
      SPRING_DATASOURCE_PASSWORD: demo
      APP_JWT_SECRET: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBkZW1vIHB1cnBvc2VzIG9ubHkgLSBjaGFuZ2UgaXQgaW4gcHJvZHVjdGlvbiAtIG1pbiA1MTIgYml0cw==
      APP_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8084:8084"

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: user-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/demoaws?currentSchema=us_fwd
      SPRING_DATASOURCE_USERNAME: demo
      SPRING_DATASOURCE_PASSWORD: demo
      APP_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8081:8081"

  cache-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: cache-service
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_PORT: 8082
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
    ports:
      - "8082:8082"

  file-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: file-service
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_PORT: 8083
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      APP_AWS_REGION: ${APP_AWS_REGION:-us-east-1}
      APP_AWS_ACCESS_KEY_ID: ${APP_AWS_ACCESS_KEY_ID:-}
      APP_AWS_SECRET_ACCESS_KEY: ${APP_AWS_SECRET_ACCESS_KEY:-}
      APP_AWS_ENDPOINT: ${APP_AWS_ENDPOINT:-}
      APP_STORAGE_BUCKET: ${APP_STORAGE_BUCKET:-demo-bucket}
    ports:
      - "8083:8083"

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: notification-service
    depends_on:
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_PORT: 8085
      APP_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
    ports:
      - "8085:8085"

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: api-gateway
    depends_on:
      - auth-service
      - user-service
      - cache-service
      - file-service
      - notification-service
      - learning-service
      - redis
    environment:
      SERVER_PORT: 8080
      SERVICES_AUTH_SERVICE_URL: http://auth-service:8084
      SERVICES_USER_SERVICE_URL: http://user-service:8081
      SERVICES_CACHE_SERVICE_URL: http://cache-service:8082
      SERVICES_FILE_SERVICE_URL: http://file-service:8083
      SERVICES_NOTIFICATION_SERVICE_URL: http://notification-service:8085
      SERVICES_LEARNING_SERVICE_URL: http://learning-service:8086
      APP_JWT_SECRET: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBkZW1vIHB1cnBvc2VzIG9ubHkgLSBjaGFuZ2UgaXQgaW4gcHJvZHVjdGlvbiAtIG1pbiA1MTIgYml0cw==
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8080:8080"

  learning-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: learning-service
    environment:
      SERVER_PORT: 8086
    ports:
      - "8086:8086"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api-gateway
    ports:
      - "3000:80"

volumes:
  postgres-data:
